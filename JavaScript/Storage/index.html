<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD de Estudiantes</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header class="top-bar">
    <h1>📚 CRUD de Estudiantes</h1>
    <div class="user-bar">
      <span id="usuarioActivo"></span>
      <button class="btn-logout" onclick="cerrarSesion()">🚪 Salir</button>
    </div>
  </header>

  <main class="main-layout">

    <!-- ══ FORMULARIO ══ -->
    <section class="card form-section">
      <h2>📝 Formulario</h2>

      <input type="hidden" id="estudianteId">

      <div class="field" id="fNombre">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej: Carlos López">
        <span class="error-msg" id="eNombre"></span>
      </div>

      <div class="field" id="fCorreo">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="Ej: carlos@email.com">
        <span class="error-msg" id="eCorreo"></span>
      </div>

      <div class="field" id="fWhatsapp">
        <label for="whatsapp">WhatsApp <span class="req">*</span></label>
        <input type="tel" id="whatsapp" placeholder="Ej: +57 300 123 4567">
        <span class="error-msg" id="eWhatsapp"></span>
      </div>

      <div class="field" id="fFecha">
        <label for="fechaNacimiento">Fecha de nacimiento</label>
        <input type="date" id="fechaNacimiento">
        <span class="error-msg" id="eFecha"></span>
      </div>

      <div class="btn-row">
        <button id="btnGuardar"  onclick="guardarEstudiante()">💾 Guardar</button>
        <button id="btnCancelar" onclick="cancelarEdicion()">✖ Cancelar</button>
      </div>
    </section>

    <!-- ══ TABLA ══ -->
    <section class="tabla-wrap">
      <h2>📋 Lista de estudiantes</h2>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>WhatsApp</th>
              <th>F. Nacimiento</th>
              <th>Edad</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
