<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – CRUD Estudiantes</title>
  <link rel="stylesheet" href="Style.css">
  <link rel="stylesheet" href="./LoginStyle.css">
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">🎓</div>
      <h1>Iniciar Sesión</h1>
      <p class="subtitle">Accede al sistema de gestión de estudiantes</p>

      <div class="field" id="fieldUser">
        <label for="loginUser">Usuario</label>
        <input type="text" id="loginUser" placeholder="Ej: admin" autocomplete="username">
        <span class="error-msg" id="errUser"></span>
      </div>

      <div class="field" id="fieldPass">
        <label for="loginPass">Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        <span class="error-msg" id="errPass"></span>
      </div>

      <button id="btnLogin" onclick="intentarLogin()">🔐 Ingresar</button>

      <div class="global-error" id="globalError">
        ❌ Usuario o contraseña incorrectos.
      </div>
    </div>
  </div>

  <script src="auth.js"></script>

</body>
</html>
