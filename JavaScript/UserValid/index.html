<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Style/style.css">
    <title>Document</title>
</head>
<body>
    <form action="submit" method="post" id="formReg">

        <label for="name">Nombre Completo</label>
        <input type="text" id="name">
        <span id="error-name" class="error-message hidden">Solo letras por favor</span>
        <br><br>

        <label for="email">Correo Electronico</label>
        <input type="text" id="email">
        <span id="error-email" class="error-message hidden">Correo no válido</span>
        <br><br>

        <label for="phone">Telefono</label>
        <input type="tel" id="phone">
        <span id="error-phone" class="error-message hidden">Deben ser 10 números</span>
        <br><br>

        <label for="password">Contraseña</label>
        <input type="password" id="password">
        <span id="error-password" class="error-message hidden">Mínimo 8 caracteres y un número</span>
        <br><br>

        <button type="submit" id="btnEnviar" disabled>Validar</button>
        <br><br>
    </form>

    <table border="1">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Telefono</th>
            </tr>
        </thead>
        <tbody id="list">
            </tbody>
    </table>

    <script src="./Js/script.js"></script>
</body>
</html>
